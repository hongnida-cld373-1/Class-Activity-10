<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo">💡LUMINA</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="contact.html" class="active">Contact</a>
            <button id="theme-toggle">🌓</button>
        </div>
    </nav>

    <section class="container">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h2>Let's Talk.</h2>
                <p>Have a big idea? We'd love to help you build it. Drop us a message and we'll get back to you within 24 hours.</p>
                <div class="details">
                    <p><strong>Email:</strong> hello@lumina.agency</p>
                    <p><strong>Location:</strong> San Francisco, CA</p>
                </div>
            </div>

            <form class="glass-card contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Tell us about your project..." rows="5"></textarea>
                <button type="submit" class="cta-button">Send Message</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
